    - name: uber-eats-accept-order-pos
      description: Uber Eats Accept an Order Into the POS
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eats.acceptPosOrder
      with:
        order_id: tools.order_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: uber-eats-cancel-order
      description: Uber Eats Cancel an Order
      hints:
        readOnly: false
