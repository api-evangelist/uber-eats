        method: GET
        description: Uber Direct List Deliveries
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: customer_id
        - name: filter
          in: query
          type: string
          required: false
          description: Filter deliveries by status (e.g. ongoing).
        - name: limit
          in: query
          type: integer
          required: false
          description: limit
        - name: offset
          in: query
          type: integer
          required: false
          description: offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createDelivery
        method: POST
        description: Uber Direct Create Delivery
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: customer_id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
