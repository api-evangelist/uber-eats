          in: path
          type: string
          required: true
          description: customer_id
        - name: delivery_id
          in: path
          type: string
          required: true
          description: delivery_id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
