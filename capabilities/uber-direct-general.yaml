      operations:
      - name: getDelivery
        method: GET
        description: Uber Direct Get Delivery
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: customer_id
        - name: delivery_id
          in: path
          type: string
          required: true
          description: delivery_id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
