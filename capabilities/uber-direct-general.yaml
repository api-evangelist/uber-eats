        description: Uber Direct Update Delivery
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: customer_id
        - name: delivery_id
          in: path
          type: string
          required: true
          description: delivery_id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers-customer-id-deliveries-delivery-id-cancel
      path: /customers/{customer_id}/deliveries/{delivery_id}/cancel
      operations:
      - name: cancelDelivery
        method: POST
        description: Uber Direct Cancel Delivery
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: customer_id
        - name: delivery_id
          in: path
          type: string
          required: true
          description: delivery_id
