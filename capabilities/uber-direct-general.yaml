      path: /customers/{customer_id}/delivery_quotes
      operations:
      - name: createQuote
        method: POST
        description: Uber Direct Create Quote
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: customer_id
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
