naftiko: 1.0.0-alpha2
info:
  label: "Uber Direct (DaaS) API \u2014 General"
  description: "Uber Direct (DaaS) API \u2014 full surface. 7 operations. Lead operation: Uber Direct Create Quote. Self-contained Naftiko capability covering one Uber business surface."
  tags:
  - Uber
  - Direct
  - Delivery
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    UBER_DIRECT_TOKEN: UBER_DIRECT_TOKEN
capability:
